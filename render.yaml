services:
  - type: web
    name: demand-forecasting-api
    env: python
    buildCommand: pip install -r requirements.txt && python src/train.py
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: web
    name: demand-forecasting-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: API_URL
        fromService:
          type: web
          name: demand-forecasting-api
          envVarKey: RENDER_EXTERNAL_URL
