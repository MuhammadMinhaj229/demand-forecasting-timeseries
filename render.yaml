services:
  - type: web
    name: aqi-alerts-backend # Re-using an existing name from workspace for demonstration, though it could be a new one
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: web
    name: demand-forecasting-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: API_URL
        fromService:
          type: web
          name: aqi-alerts-backend
          envVarKey: RENDER_EXTERNAL_URL
